# OPC → EMS 数据转发配置（纯同步模式）
# 只需配置服务器信息，点位自动发现

[Server]
ProgId=Hollysys.HOLLiASiComm.1
HostName=192.168.1.100

[Polling]
IntervalMs=1000
# 数据源: Cache(读缓存,快) / Device(读设备,保证最新)
DataSource=Cache
# 连接失败重试
RetryCount=5
RetryDelayMs=3000

# [Points] 留空 = 自动浏览OPC服务器所有点位
# 如需指定部分点位: OPC点位ID | EMS点名 | 类型(Ax/Dx/Cx)
[Points]
