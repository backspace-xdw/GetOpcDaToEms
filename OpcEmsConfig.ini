# OPC → EMS 数据转发配置
# 只需配置服务器信息，点位在 [Points] 段配置

[Server]
ProgId=Hollysys.HOLLiASiComm.1
HostName=192.168.1.100

[Polling]
IntervalMs=1000
ReadMode=SyncCache
AsyncTimeoutMs=5000
RetryCount=5
RetryDelayMs=3000

# 点位映射: OPC点位ID, EMS点名, 类型(Ax/Dx/Cx)
[Points]
# TE_025052A, WebSendQPai, Ax
# TE_025052B, WebSendQCeng, Ax
